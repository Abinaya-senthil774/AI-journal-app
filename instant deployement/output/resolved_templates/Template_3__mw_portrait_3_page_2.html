<!doctype html>
<html><head><meta charset="utf-8"><title>Instant Camera Polaroid Cascade</title><style>
body { font-family: -apple-system, Helvetica, sans-serif; background:#f1efe9; margin:0;
       padding:32px; display:flex; flex-direction:column; align-items:center; }
h1 { font-size: 16px; color:#333; margin: 0 0 4px; }
.meta { font-size: 12px; color:#888; margin-bottom: 16px; }
.canvas { position:relative; background:#fff; box-shadow:0 6px 24px rgba(0,0,0,0.18); overflow:hidden; }
.ph-el { position:absolute; box-sizing:border-box; display:flex; align-items:center;
         justify-content:center; text-align:center; overflow:hidden; }
.ph-label { font-size:10px; color:#444; padding:2px; line-height:1.2; }
.ph-photo  { background: repeating-linear-gradient(45deg,#d9d9d9,#d9d9d9 8px,#c8c8c8 8px,#c8c8c8 16px); border:2px solid #999; }
.ph-text   { background: rgba(255,255,255,0.65); border:1px dashed #8b6f47; }
.ph-decor  { background:#ffd9ec; border-radius:50%; color:#5a2d44; font-size:9px; }
.ph-person { background:#cfe8d8; border:2px dashed #4a8a63; }
.ph-group  { background:transparent; border:2px dotted #999; }
.ph-music  { background:#cdd6f6; border:1px solid #5566aa; }
.ph-shape  { background:#fff3c4; border:1px solid #c9a227; }
.ph-other  { background:#eee; border:1px solid #bbb; }
</style></head>
<body>
  <h1>Instant Camera Polaroid Cascade</h1>
  <div class="meta">Memory Weave - Portrait templates -3.pdf &middot; source: Template 3.json &middot; schema B &middot; 1200x1600</div>
  <div class="canvas" style="width:480px; height:640px; background:#D2CFC2;">
    <div class="ph-el ph-group" style="left:10%; top:10%; width:10%; height:10%; z-index:2; " title="composite_group"><span class="ph-label">polaroid_grid_container</span></div><div class="ph-el ph-decor" style="left:28%; top:62%; width:68%; height:38%; z-index:3; " title="graphic_element"><span class="ph-label">illustration_instant_camera</span></div><div class="ph-el ph-decor" style="left:2%; top:75%; width:30%; height:22%; z-index:4; " title="doodle_placeholder"><span class="ph-label">doodle_square_bottom_left</span></div><div class="ph-el ph-decor" style="left:27%; top:59%; width:6%; height:6%; z-index:4; " title="vector_graphic"><span class="ph-label">sparkle_accent</span></div>
  </div>
</body></html>
